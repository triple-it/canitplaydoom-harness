name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (logic-only, no engine)
        run: |
          python -m pip install --upgrade pip
          pip install numpy openai pytest
      - name: Run unit tests
        run: pytest -q
